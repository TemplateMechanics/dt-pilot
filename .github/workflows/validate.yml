name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Only the pre-commit gate runs in dt-pilot CI by default. A real
# `monaco deploy --dry-run` job is intentionally NOT here:
#   - it requires Dynatrace credentials we won't grant to forks / PR
#     workflows for security reasons; and
#   - the structural manifest check (`Test-MonacoManifest.ps1`, run by
#     the gate) catches every class of error a dry-run-without-creds
#     would catch.
# Consumers who want a credentialed dry-run job should add it to their
# fork in a separate workflow file that runs on `workflow_dispatch` and
# reads from a protected GitHub Actions environment.

jobs:
  pre-commit-gate:
    name: Pre-commit gate (manifest + MCP secret hygiene + Pester)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Default depth (1) is fine: CI runs -All, not -StagedOnly, so no
        # base ref is needed for the staged-diff path.

      - name: Install Pester 5 (pinned)
        shell: pwsh
        run: |
          # Pin to a specific, vetted Pester version rather than tracking
          # 'latest', and use standard publisher verification (no
          # -SkipPublisherCheck) so the install rejects an unexpected
          # signature.
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force

      - name: Run Pre-Commit gate (full, not -StagedOnly)
        shell: pwsh
        run: |
          ./scripts/Pre-Commit.ps1 -All
